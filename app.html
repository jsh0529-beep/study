<style>
:root{
  --green:#1B5E43;      /* 칠판·지폐 그린 */
  --green-deep:#123F2D;
  --gold:#E8B33C;       /* 동전 골드 */
  --paper:#FBF8F0;      /* 공책 아이보리 */
  --ink:#22271F;
  --coral:#E4573D;      /* 오답 코랄 */
  --sky:#3E7CB1;
  --line:#E3DCC9;
  --radius:16px;
  --shadow:0 4px 14px rgba(27,94,67,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:16px}
.jua{font-family:'Jua',sans-serif;font-weight:400}
#app{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--paper)}

/* ── 헤더: 칠판 ───────────────────────── */
header{background:var(--green);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.15)}
header .logo{font-size:22px;letter-spacing:.5px}
header .logo .chalk{color:var(--gold)}
header .badge{margin-left:auto;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500}
header .gear{color:#fff;font-size:18px;opacity:.85;padding:4px}

/* ── 공통 ─────────────────────────────── */
.screen{display:none;flex:1;flex-direction:column}
.screen.on{display:flex}
.wrap{padding:18px;display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.sec-title{font-size:18px;color:var(--green-deep);margin-bottom:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;padding:12px 18px;font-weight:700;font-size:15px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}
.btn-gold{background:var(--gold);color:var(--green-deep)}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.small{font-size:12px;color:#7d7a6f}

/* ── 홈 ───────────────────────────────── */
.hello{background:linear-gradient(135deg,var(--green) 0%,var(--green-deep) 100%);color:#fff;border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.hello::after{content:"₩";position:absolute;right:-6px;bottom:-26px;font-size:110px;font-family:'Jua';color:rgba(255,255,255,.07)}
.hello h2{font-size:21px;margin-bottom:4px}
.hello p{font-size:13px;opacity:.85}
.subjects{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.subj{background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);padding:16px 14px;text-align:left;transition:border-color .15s}
.subj:hover{border-color:var(--green)}
.subj .emoji{font-size:26px}
.subj .name{font-size:17px;color:var(--green-deep);margin-top:6px}
.subj .cnt{font-size:11px;color:#8b8779;margin-top:2px}
.subj.money{grid-column:1/-1;background:linear-gradient(135deg,#FFF6E2,#FDEFC9);border-color:var(--gold)}

/* 대시보드 */
.bar-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:8px}
.bar-row .lab{width:92px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar{flex:1;height:10px;background:#EFEADB;border-radius:6px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--green);border-radius:6px}
.bar-row .pct{width:38px;text-align:right;font-weight:700;color:var(--green-deep)}
.alert-root{background:#FDECE7;border:1px solid #F3C4B8;border-radius:12px;padding:10px 12px;font-size:13px;color:#9A3B27;margin-top:10px}

/* 책 배너 */
.book{display:flex;gap:14px;align-items:center;background:#fff;border:1.5px solid var(--gold);border-radius:var(--radius);padding:14px 16px;text-decoration:none;color:var(--ink)}
.book .cover{width:52px;height:72px;border-radius:6px;background:linear-gradient(160deg,var(--gold),#C98F1E);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Jua';font-size:12px;text-align:center;line-height:1.3;flex-shrink:0;box-shadow:0 3px 8px rgba(201,143,30,.35)}
.book b{font-size:14px}.book p{font-size:12px;color:#7d7a6f}

/* ── 수업 화면 ─────────────────────────── */
.lesson-top{background:#fff;border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:52px;z-index:40}
.lesson-top .back{font-size:20px;color:var(--green-deep);padding:2px 6px}
.lesson-top .unit{font-size:14px;font-weight:700;color:var(--green-deep);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modes{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--line);overflow-x:auto;position:sticky;top:98px;z-index:40}
.mode{flex-shrink:0;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;background:#F1EDE0;color:#6b675c}
.mode.on{background:var(--green);color:#fff}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:86%;padding:12px 14px;border-radius:16px;font-size:15px;white-space:pre-wrap;word-break:break-word}
.msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.ai .who{font-family:'Jua';font-size:12px;color:var(--green);margin-bottom:4px}
.msg.me{align-self:flex-end;background:var(--green);color:#fff;border-bottom-right-radius:4px}
.msg.sys{align-self:center;background:#FFF3D6;border:1px solid #F0DCA2;color:#8a6d1d;font-size:13px;border-radius:12px;text-align:center}
.msg img{max-width:100%;border-radius:8px;margin-top:6px}
.verdict{display:inline-block;font-family:'Jua';font-size:13px;border-radius:8px;padding:2px 8px;margin-bottom:6px}
.verdict.ok{background:#E3F2E8;color:var(--green)}
.verdict.no{background:#FDECE7;color:var(--coral)}
.typing{align-self:flex-start;font-size:13px;color:#8b8779;padding:6px 10px}
.typing i{animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

.quicks{display:flex;gap:6px;padding:8px 16px 0;flex-wrap:wrap}
.quick{border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;background:#fff;border:1.5px solid var(--line);color:#6b675c}
.inputbar{display:flex;gap:8px;padding:10px 16px calc(14px + env(safe-area-inset-bottom));background:var(--paper)}
.inputbar textarea{flex:1;border:1.5px solid var(--line);border-radius:14px;padding:11px 14px;resize:none;height:48px;max-height:120px;background:#fff;outline-color:var(--green)}
.inputbar .send{width:48px;height:48px;border-radius:14px;background:var(--green);color:#fff;font-size:18px;flex-shrink:0}
.inputbar .cam{width:48px;height:48px;border-radius:14px;background:#fff;border:1.5px solid var(--line);font-size:18px;flex-shrink:0}

/* ── 단원 선택 ─────────────────────────── */
.units{display:flex;flex-direction:column;gap:8px}
.unitbtn{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;text-align:left;font-size:15px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.unitbtn:hover{border-color:var(--green)}
.unitbtn .acc{font-size:12px;font-weight:700;color:var(--green)}
.unitbtn .acc.low{color:var(--coral)}
.semtab{display:flex;gap:8px;margin-bottom:12px}
.semtab button{flex:1;padding:9px;border-radius:10px;font-weight:700;background:#F1EDE0;color:#6b675c}
.semtab button.on{background:var(--green);color:#fff}

/* ── 쉬는 타임 퀴즈 ────────────────────── */
.quiz-opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;margin-top:8px}
.quiz-opt.ok{border-color:var(--green);background:#E3F2E8}
.quiz-opt.no{border-color:var(--coral);background:#FDECE7}

/* ── 모달 ─────────────────────────────── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,30,25,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--paper);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;padding:22px 20px calc(24px + env(safe-area-inset-bottom))}
.modal h3{font-family:'Jua';font-size:20px;color:var(--green-deep);margin-bottom:12px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;color:#5d5a50}
.field input,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;background:#fff;outline-color:var(--green)}
footer{padding:20px 18px 30px;text-align:center;font-size:12px;color:#a09c8e}
footer a{color:var(--green);font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo jua">AI <span class="chalk">1타강사</span></div>
  <div class="badge">《돈의 언어》 공식</div>
  <button class="gear" onclick="openSettings()">⚙️</button>
</header>

<!-- ═══ 홈 ═══ -->
<section id="scr-home" class="screen on">
  <div class="wrap">
    <div class="hello">
      <h2 class="jua" id="helloTitle">안녕! 오늘도 시작해볼까?</h2>
      <p id="helloSub">과목을 고르면 쌤이 기다리고 있어.</p>
    </div>

    <div class="subjects" id="subjectGrid"></div>

    <div class="card" id="dashCard">
      <div class="sec-title jua">📊 나의 실력 지도</div>
      <div id="dashBody"><p class="small">아직 기록이 없어. 문제를 풀면 여기에 실력이 쌓여!</p></div>
    </div>

    <a class="book" id="bookBanner" href="#" target="_blank" rel="noopener">
      <div class="cover">돈의<br>언어</div>
      <div>
        <b>《국영수보다 먼저 가르쳐야 할 돈의 언어》</b>
        <p>이 앱을 만든 저자의 책 — 우리 아이 첫 경제교육의 시작. 부모님과 함께 읽어보세요 →</p>
      </div>
    </a>
  </div>
  <footer>made by 《돈의 언어》 저자 · <a href="#" onclick="openSettings();return false">설정</a></footer>
</section>

<!-- ═══ 단원 선택 ═══ -->
<section id="scr-units" class="screen">
  <div class="lesson-top">
    <button class="back" onclick="go('home')">←</button>
    <div class="unit" id="unitsTitle">단원 선택</div>
  </div>
  <div class="wrap">
    <div class="semtab" id="semTab"></div>
    <div class="units" id="unitList"></div>
  </div>
</section>

<!-- ═══ 수업 ═══ -->
<section id="scr-lesson" class="screen">
  <div class="lesson-top">
    <button class="back" onclick="go('home')">←</button>
    <div class="unit" id="lessonTitle"></div>
  </div>
  <div class="modes" id="modeTabs"></div>
  <div id="chat"></div>
  <div class="quicks">
    <button class="quick" onclick="quickSend('😵 조금 어려워요. 더 쉽게 설명해 주세요.')">😵 어려워요</button>
    <button class="quick" onclick="quickSend('다음 문제 주세요!')">➡️ 다음 문제</button>
    <button class="quick" onclick="startBreakQuiz()">🍀 쉬는 타임 퀴즈</button>
  </div>
  <div class="inputbar">
    <button class="cam" onclick="document.getElementById('photoInput').click()" title="시험지·숙제 사진 올리기">📷</button>
    <input type="file" id="photoInput" accept="image/*" hidden onchange="onPhoto(this)">
    <textarea id="msgInput" placeholder="쌤한테 말해봐!" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button class="send" onclick="sendMsg()">↑</button>
  </div>
</section>

<!-- ═══ 온보딩 ═══ -->
<div class="modal-bg" id="mdOnboard">
  <div class="modal">
    <h3>처음 만나서 반가워! 👋</h3>
    <p class="small" style="margin-bottom:14px">쌤이 너한테 딱 맞게 가르치려면 세 가지만 알려줘.</p>
    <div class="field"><label>이름 (별명도 좋아)</label><input id="obName" placeholder="예: 민준"></div>
    <div class="field"><label>요즘 제일 좋아하는 것 — 쌤이 이걸로 비유해서 설명해 줄게!</label><input id="obInterest" placeholder="예: 축구, 로블록스, 아이돌, 요리"></div>
    <div class="field"><label>연결 주소 (부모님이 넣어주세요 — GAS 웹앱 URL)</label><input id="obGas" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <button class="btn btn-green" style="width:100%" onclick="finishOnboard()">시작하기 🚀</button>
  </div>
</div>

<!-- ═══ 설정 ═══ -->
<div class="modal-bg" id="mdSettings">
  <div class="modal">
    <h3>설정</h3>
    <div class="field"><label>이름</label><input id="stName"></div>
    <div class="field"><label>관심사 (비유 엔진)</label><input id="stInterest"></div>
    <div class="field"><label>GAS 웹앱 URL</label><input id="stGas"></div>
    <div class="field"><label>《돈의 언어》 구매 링크 (책 배너에 연결)</label><input id="stBook" placeholder="교보문고/알라딘 상품 URL"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" style="flex:1" onclick="saveSettings()">저장</button>
      <button class="btn btn-ghost" onclick="if(confirm('학습 기록을 모두 지울까요?')){localStorage.removeItem('tutor_records');renderDash();closeModal()}">기록 초기화</button>
    </div>
  </div>
</div>

</div>

<script>
/* ══════════════ 데이터: 초6 단원 맵 (2022 개정 기준·수정 가능) ══════════════ */
const CURRICULUM = {
  "수학": {emoji:"🔢", sem:{
    "1학기":["분수의 나눗셈","각기둥과 각뿔","소수의 나눗셈","비와 비율","여러 가지 그래프","직육면체의 부피와 겉넓이"],
    "2학기":["분수의 나눗셈 (2)","소수의 나눗셈 (2)","공간과 입체","비례식과 비례배분","원의 넓이","원기둥·원뿔·구"]}},
  "국어": {emoji:"📖", sem:{
    "1학기":["비유하는 표현","이야기를 간추려요","짜임새 있게 구성해요","주장과 근거를 판단해요","속담을 활용해요","내용을 추론해요"],
    "2학기":["작품 속 인물과 나","관용 표현을 활용해요","타당한 근거로 글을 써요","효과적으로 발표해요","글에 담긴 생각과 비교해요","정보와 표현 판단하기"]}},
  "사회": {emoji:"🌏", sem:{
    "1학기":["우리나라의 정치 발전","우리나라의 경제 발전"],
    "2학기":["세계 여러 나라의 자연과 문화","통일 한국의 미래와 지구촌의 평화"]}},
  "과학": {emoji:"🔬", sem:{
    "1학기":["지구와 달의 운동","여러 가지 기체","식물의 구조와 기능","빛과 렌즈"],
    "2학기":["전기의 이용","계절의 변화","연소와 소화","우리 몸의 구조와 기능","에너지와 생활"]}},
  "영어": {emoji:"🗣️", sem:{
    "1학기":["자기소개와 일과 말하기","과거에 한 일 말하기","길 묻고 안내하기","음식 주문·가격 묻기"],
    "2학기":["미래 계획 말하기","비교해서 말하기","이유 묻고 답하기","초대하고 제안하기"]}}
};

/* 수학 단원 ↔ 《돈의 언어》 연계 컨텍스트 */
const MONEY_MATH = {
  "분수의 나눗셈":"용돈을 똑같이 나누기, 피자값 나눠 내기",
  "소수의 나눗셈":"물건 단가 계산, 환율 계산",
  "비와 비율":"할인율, 이자율, 환율 — 돈의 언어의 핵심!",
  "여러 가지 그래프":"용돈 사용 내역 그래프, 물가 변화 그래프",
  "비례식과 비례배분":"형제끼리 용돈 배분, 투자 수익 나누기",
  "직육면체의 부피와 겉넓이":"저금통 크기, 택배 상자와 배송비"
};

/* 쉬는 타임 퀴즈 (부자 지수 문제은행 스타일 · /rich/ 이식분 샘플) */
const BREAK_QUIZ = [
 {q:"은행에 돈을 맡기면 은행이 주는 고마움의 표시는?",o:["세금","이자","벌금","용돈"],a:1,exp:"은행에 돈을 맡기면 '이자'를 받아. 돈이 돈을 버는 첫걸음이야!"},
 {q:"물건 값이 전체적으로 계속 오르는 현상을 뭐라고 할까?",o:["인플레이션","디플레이션","할인","적금"],a:0,exp:"인플레이션! 같은 1,000원으로 살 수 있는 게 점점 줄어드는 거야."},
 {q:"이자에 이자가 붙어서 눈덩이처럼 불어나는 것은?",o:["단리","복리","금리","환율"],a:1,exp:"복리! 《돈의 언어》에서 '세상에서 가장 힘센 눈덩이'라고 부르는 그것."},

 {q:"나라 살림에 쓰려고 국민에게 걷는 돈은?",o:["이자","세금","회비","벌금"],a:1,exp:"세금! 학교, 도로, 병원… 우리가 쓰는 많은 것이 세금으로 만들어져."},
 {q:"회사의 주인이 되는 증서를 사고파는 것은?",o:["채권","주식","적금","보험"],a:1,exp:"주식! 주식을 사면 그 회사의 아주 작은 주인이 되는 거야."}

/* ══════════════ 상태 ══════════════ */
const S = {
  cfg: JSON.parse(localStorage.getItem('tutor_cfg')||'null'),
  records: JSON.parse(localStorage.getItem('tutor_records')||'[]'),
  subject:null, unit:null, mode:'concept',
  history:[],           // {role, content}
  wrongStreak:0, busy:false,
  quiz:null
};
const MODES = [
  {id:'concept', name:'💡 개념 배우기'},
  {id:'problem', name:'✏️ 문제 풀기'},
  {id:'havruta', name:'🔄 내가 선생님'},
  {id:'question',name:'❓ 질문하기'}
];

/* ══════════════ 시스템 프롬프트 ══════════════ */
function sysPrompt(){
  const c=S.cfg, moneyCtx=MONEY_MATH[S.unit];
  let p=`너는 대한민국 최고의 초등 6학년 전문 AI 과외 선생님 "일타쌤"이다. 《국영수보다 먼저 가르쳐야 할 돈의 언어》 저자가 만든 학습 파트너다.

[학생 정보]
- 이름: ${c.name} (초등학교 6학년)
- 관심사: ${c.interest} → 개념을 설명할 때 반드시 이 관심사를 활용한 비유를 우선 사용하라.

[현재 수업]
- 과목: ${S.subject} / 단원: ${S.unit}

[일타쌤의 절대 원칙]
1. 정답을 바로 알려주지 않는다. ①일상 비유로 개념 설명 → ②아주 쉬운 예제 → ③본 문제 힌트 순서로 이끈다.
2. 초6이 아는 어휘만 쓴다. 한 번에 3~4문장, 짧게 말하고 아이의 반응을 기다린다.
3. 아이가 맞히면 구체적으로 칭찬하고, 틀리면 절대 혼내지 않고 "좋아, 거의 다 왔어!"처럼 격려한다.
4. 아이가 어려워하면(틀림이 반복되면) 난이도를 한 단계 낮추고, 필요하면 이전 학년(5학년 이하) 뿌리 개념까지 내려가 구멍을 메운다.
5. 이모지를 적절히 써서 친근하게, 그러나 수업의 긴장감은 유지한다.`;

  if(S.subject==='수학' && moneyCtx){
    p+=`\n6. [돈의 언어 연계] 문제와 비유를 만들 때 돈 상황(${moneyCtx})을 우선 활용하라. 수학이 곧 돈의 언어임을 자연스럽게 느끼게 하라.`;
  }

  const modeRules={
    concept:`\n[현재 모드: 개념 배우기]\n이 단원의 핵심 개념을 비유→쉬운 예→확인 질문 순으로 가르쳐라. 한 덩어리 설명 후 반드시 "여기까지 이해됐어?" 같은 확인 질문으로 끝내라.`,
    problem:`\n[현재 모드: 문제 풀기]\n이 단원 문제를 1개씩 낸다. 아이가 답하면 채점한다.
채점 답변의 맨 끝에는 반드시 다음 형식의 판정 태그를 붙여라(아이에게는 보이지 않는 시스템용이다):
- 정답이면: <<판정:정답>>
- 오답이면: <<판정:오답|이유>> — 이유는 반드시 [개념오해/계산실수/독해실패] 중 하나.
오답이면 정답을 바로 알려주지 말고 힌트로 다시 기회를 줘라. 두 번째도 틀리면 그때 풀이를 차근차근 설명하라.`,
    havruta:`\n[현재 모드: 내가 선생님 (하브루타)]\n지금부터 너는 선생님이 아니라 궁금한 게 많은 초등학교 5학년 동생 "도리"다. ${c.name}(선생님 역할)에게 이 단원 내용을 물어보고 배워라.
- "선생님, ${S.unit}이 뭐예요?"처럼 순수하게 질문하라.
- 아이의 설명이 맞으면 "아하!"하고 이해한 티를 내고, 살짝 틀린 부분이 있으면 일부러 그 부분을 파고드는 질문을 하라. (예: "어? 그럼 이건 왜 그래요?")
- 절대 직접 가르치지 마라. 아이가 설명하다 막히면 "괜찮아요, 아는 데까지만요!"라고 격려하라.
- 아이가 완전히 잘못 설명하면 순진한 반문으로 스스로 발견하게 유도하라.`,
    question:`\n[현재 모드: 질문하기]\n아이가 묻는 것(숙제, 학교 수업, 시험지 사진 포함)에 답하되, 역시 정답 직행 금지. 힌트와 유도 질문으로 스스로 풀게 하라. 시험지 사진이 오면: 틀린 문제를 찾아 각각 왜 틀렸는지 [개념오해/계산실수/독해실패]로 진단하고, 비슷한 연습 문제를 1개 내라.`
  };
  p+=modeRules[S.mode];

  if(S.wrongStreak>=2) p+=`\n\n[긴급] 아이가 지금 ${S.wrongStreak}번 연속으로 틀려서 좌절할 수 있는 상태다. 난이도를 확 낮추고, 따뜻하게 격려하고, 자신감을 회복할 수 있는 아주 쉬운 문제부터 다시 시작하라.`;
  return p;
}

/* ══════════════ API (GAS 릴레이) ══════════════ */
async function callAI(){
  const r=await fetch(S.cfg.gasUrl,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},  // preflight 회피
    body:JSON.stringify({action:'chat',system:sysPrompt(),messages:S.history.slice(-20)})
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d.text;
}

/* ══════════════ 채팅 흐름 ══════════════ */
const chatEl=()=>document.getElementById('chat');
function addMsg(role,text,imgSrc){
  const div=document.createElement('div');
  div.className='msg '+(role==='ai'?'ai':role==='sys'?'sys':'me');
  if(role==='ai'){
    let verdict='';
    const m=text.match(/<<판정:(정답|오답)(?:\|(개념오해|계산실수|독해실패))?>>/);
    if(m){
      recordResult(m[1]==='정답',m[2]||null);
      verdict=`<span class="verdict ${m[1]==='정답'?'ok':'no'}">${m[1]==='정답'?'⭕ 정답!':'❌ 다시 도전!'}</span><br>`;
      text=text.replace(/<<판정:[^>]*>>/g,'').trim();
    }
    div.innerHTML=`<div class="who">👨‍🏫 일타쌤</div>${verdict}${esc(text)}`;
  }else{
    div.textContent=text;
    if(imgSrc){const im=document.createElement('img');im.src=imgSrc;div.appendChild(im);}
  }
  chatEl().appendChild(div);
  chatEl().scrollTop=chatEl().scrollHeight;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

async function sendMsg(text){
  const input=document.getElementById('msgInput');
  const t=(text||input.value).trim();
  if(!t||S.busy) return;
  if(!text) input.value='';
  addMsg('me',t);
  S.history.push({role:'user',content:t});
  await askAI();
}
function quickSend(t){ if(t.includes('어려워')) S.wrongStreak=Math.max(S.wrongStreak,2); sendMsg(t); }

async function askAI(){
  S.busy=true;
  const tp=document.createElement('div');tp.className='typing';tp.innerHTML='일타쌤이 생각 중<i>...</i>';
  chatEl().appendChild(tp);chatEl().scrollTop=chatEl().scrollHeight;
  try{
    const reply=await callAI();
    S.history.push({role:'assistant',content:reply});
    tp.remove();
    addMsg('ai',reply);
    logToSheet();
  }catch(e){
    tp.remove();
    addMsg('sys','연결에 문제가 있어요 😢 부모님께 설정(⚙️)의 GAS 주소를 확인해 달라고 말해줘! ('+e.message+')');
  }
  S.busy=false;
}

/* 사진 업로드 → vision */
function onPhoto(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=async()=>{
    const dataUrl=rd.result;
    const b64=dataUrl.split(',')[1];
    addMsg('me','📷 사진을 올렸어요',dataUrl);
    S.history.push({role:'user',content:[
      {type:'image',source:{type:'base64',media_type:f.type||'image/jpeg',data:b64}},
      {type:'text',text:'이 시험지(또는 숙제) 사진을 봐 주세요. 틀린 문제를 진단해 주세요.'}
    ]});
    await askAI();
  };
  rd.readAsDataURL(f);
  inp.value='';
}

/* ══════════════ 오답 기록·진단 ══════════════ */
function recordResult(correct,reason){
  S.wrongStreak = correct?0:S.wrongStreak+1;
  S.records.push({d:Date.now(),subject:S.subject,unit:S.unit,ok:correct,reason:reason});
  localStorage.setItem('tutor_records',JSON.stringify(S.records));
  /* 같은 이유 3회 → 뿌리 회귀 안내 */
  if(!correct&&reason){
    const same=S.records.filter(r=>!r.ok&&r.reason===reason&&r.subject===S.subject).length;
    if(same>0&&same%3===0){
      addMsg('sys',`💡 "${reason}" 유형으로 세 번 틀렸어. 일타쌤이 더 아래 개념부터 다시 잡아줄 거야!`);
      S.history.push({role:'user',content:`(시스템: 학생이 "${reason}" 유형 오답을 누적 3회 기록했다. 이 단원의 뿌리가 되는 이전 학년 개념으로 내려가서 기초부터 점검하고 메워라.)`});
    }
  }
}

/* ══════════════ 쉬는 타임 퀴즈 (로컬·API 미사용) ══════════════ */
function startBreakQuiz(){
  const q=BREAK_QUIZ[Math.floor(Math.random()*BREAK_QUIZ.length)];
  S.quiz=q;
  const div=document.createElement('div');
  div.className='msg sys';div.style.textAlign='left';div.style.maxWidth='92%';
  div.innerHTML=`<b>🍀 쉬는 타임! 부자 퀴즈</b><br>${esc(q.q)}`+
    q.o.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz(this,${i})">${i+1}. ${esc(o)}</button>`).join('');
  chatEl().appendChild(div);chatEl().scrollTop=chatEl().scrollHeight;
}
function answerQuiz(btn,i){
  if(!S.quiz) return;
  const ok=i===S.quiz.a;
  btn.classList.add(ok?'ok':'no');
  const div=document.createElement('div');div.className='msg sys';div.style.textAlign='left';div.style.maxWidth='92%';
  div.innerHTML=(ok?'🎉 정답! ':'아쉽다! 정답은 "'+esc(S.quiz.o[S.quiz.a])+'"야. ')+esc(S.quiz.exp)+
    '<br><span class="small">더 많은 돈 이야기는 《돈의 언어》 책에서! 📕</span>';
  chatEl().appendChild(div);chatEl().scrollTop=chatEl().scrollHeight;
  S.quiz=null;
}

/* ══════════════ 화면 전환·렌더 ══════════════ */
function go(scr){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('scr-'+scr).classList.add('on');
  if(scr==='home') renderDash();
}
function renderHome(){
  const g=document.getElementById('subjectGrid');
  g.innerHTML=Object.entries(CURRICULUM).map(([name,v])=>{
    const cnt=Object.values(v.sem).flat().length;
    const money=name==='수학'?' money':'';
    return `<button class="subj${money}" onclick="openUnits('${name}')">
      <div class="emoji">${v.emoji}</div><div class="name jua">${name}${name==='수학'?' <span style="font-size:11px;color:#C98F1E">× 돈의 언어</span>':''}</div>
      <div class="cnt">${cnt}개 단원</div></button>`;
  }).join('');
  if(S.cfg){
    document.getElementById('helloTitle').textContent=`${S.cfg.name}, 오늘도 시작해볼까? 🔥`;
    const h=new Date().getHours();
    document.getElementById('helloSub').textContent=(h<12?'아침 공부가 제일 잘 돼! ':h<18?'오후 집중 타임! ':'자기 전 복습이 최고야! ')+'과목을 골라봐.';
  }
  if(S.cfg&&S.cfg.bookUrl) document.getElementById('bookBanner').href=S.cfg.bookUrl;
}
function unitAcc(subject,unit){
  const rs=S.records.filter(r=>r.subject===subject&&r.unit===unit);
  if(!rs.length) return null;
  return Math.round(rs.filter(r=>r.ok).length/rs.length*100);
}
let curSem='1학기';
function openUnits(subject){
  S.subject=subject;curSem='1학기';
  document.getElementById('unitsTitle').textContent=CURRICULUM[subject].emoji+' '+subject;
  renderSem();go('units');
}
function renderSem(){
  const sems=Object.keys(CURRICULUM[S.subject].sem);
  document.getElementById('semTab').innerHTML=sems.map(s=>
    `<button class="${s===curSem?'on':''}" onclick="curSem='${s}';renderSem()">${s}</button>`).join('');
  document.getElementById('unitList').innerHTML=CURRICULUM[S.subject].sem[curSem].map(u=>{
    const acc=unitAcc(S.subject,u);
    const badge=acc===null?'':`<span class="acc${acc<60?' low':''}">${acc}%</span>`;
    return `<button class="unitbtn" onclick="startLesson('${u.replace(/'/g,"\\'")}')">${u}${badge}</button>`;
  }).join('');
}
function startLesson(unit){
  S.unit=unit;S.mode='concept';S.history=[];S.wrongStreak=0;
  document.getElementById('lessonTitle').textContent=`${CURRICULUM[S.subject].emoji} ${S.subject} · ${unit}`;
  renderModes();chatEl().innerHTML='';
  go('lesson');
  S.history.push({role:'user',content:`(수업 시작. 학생에게 먼저 반갑게 인사하고 현재 모드에 맞게 수업을 시작하라.)`});
  askAI();
}
function renderModes(){
  document.getElementById('modeTabs').innerHTML=MODES.map(m=>
    `<button class="mode ${m.id===S.mode?'on':''}" onclick="switchMode('${m.id}')">${m.name}</button>`).join('');
}
function switchMode(id){
  if(S.mode===id||S.busy) return;
  S.mode=id;renderModes();
  const names={concept:'개념 배우기',problem:'문제 풀기',havruta:'내가 선생님 (이제 네가 동생 도리를 가르쳐봐!)',question:'질문하기'};
  addMsg('sys','모드 변경 → '+names[id]);
  S.history.push({role:'user',content:`(모드가 "${names[id]}"(으)로 바뀌었다. 새 모드 규칙에 맞게 자연스럽게 전환하라.)`});
  askAI();
}

/* ══════════════ 대시보드 ══════════════ */
function renderDash(){
  const el=document.getElementById('dashBody');
  if(!S.records.length){el.innerHTML='<p class="small">아직 기록이 없어. 문제를 풀면 여기에 실력이 쌓여!</p>';return;}
  const byUnit={};
  S.records.forEach(r=>{
    const k=r.subject+'·'+r.unit;
    byUnit[k]=byUnit[k]||{ok:0,all:0};
    byUnit[k].all++;if(r.ok)byUnit[k].ok++;
  });
  let html=Object.entries(byUnit).slice(-6).map(([k,v])=>{
    const p=Math.round(v.ok/v.all*100);
    return `<div class="bar-row"><span class="lab">${k}</span><span class="bar"><i style="width:${p}%;${p<60?'background:var(--coral)':''}"></i></span><span class="pct">${p}%</span></div>`;
  }).join('');
  /* 뿌리 개념 경고 */
  const reasons={};
  S.records.filter(r=>!r.ok&&r.reason).forEach(r=>reasons[r.reason]=(reasons[r.reason]||0)+1);
  const worst=Object.entries(reasons).sort((a,b)=>b[1]-a[1])[0];
  if(worst&&worst[1]>=3) html+=`<div class="alert-root">🔍 <b>${worst[0]}</b> 유형 오답이 ${worst[1]}회야. 이 유형이 나오면 일타쌤이 기초 개념부터 다시 잡아줄게!</div>`;
  el.innerHTML=html;
}

/* ══════════════ 학습 기록 → 구글 시트 (부모 브리핑용) ══════════════ */
function logToSheet(){
  if(!S.cfg||!S.cfg.gasUrl) return;
  const today=S.records.filter(r=>new Date(r.d).toDateString()===new Date().toDateString());
  fetch(S.cfg.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'log',name:S.cfg.name,subject:S.subject,unit:S.unit,mode:S.mode,
      todayOk:today.filter(r=>r.ok).length,todayAll:today.length,
      lastReason:(S.records.slice(-1)[0]||{}).reason||''})
  }).catch(()=>{});
}

/* ══════════════ 온보딩·설정 ══════════════ */
function finishOnboard(){
  const name=document.getElementById('obName').value.trim();
  const interest=document.getElementById('obInterest').value.trim();
  const gasUrl=document.getElementById('obGas').value.trim();
  if(!name||!interest){alert('이름과 관심사를 알려줘!');return;}
  if(!gasUrl){alert('GAS 웹앱 URL이 필요해요. 부모님께 부탁해 주세요!');return;}
  S.cfg={name,interest,gasUrl,bookUrl:''};
  localStorage.setItem('tutor_cfg',JSON.stringify(S.cfg));
  document.getElementById('mdOnboard').classList.remove('on');
  renderHome();
}
function openSettings(){
  if(!S.cfg) return;
  document.getElementById('stName').value=S.cfg.name;
  document.getElementById('stInterest').value=S.cfg.interest;
  document.getElementById('stGas').value=S.cfg.gasUrl;
  document.getElementById('stBook').value=S.cfg.bookUrl||'';
  document.getElementById('mdSettings').classList.add('on');
}
function saveSettings(){
  S.cfg.name=document.getElementById('stName').value.trim();
  S.cfg.interest=document.getElementById('stInterest').value.trim();
  S.cfg.gasUrl=document.getElementById('stGas').value.trim();
  S.cfg.bookUrl=document.getElementById('stBook').value.trim();
  localStorage.setItem('tutor_cfg',JSON.stringify(S.cfg));
  closeModal();renderHome();
}
function closeModal(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('on'))}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m&&m.id!=='mdOnboard')closeModal()}));

/* ══════════════ 초기화 ══════════════ */
renderHome();renderDash();
if(!S.cfg) document.getElementById('mdOnboard').classList.add('on');
</script>
